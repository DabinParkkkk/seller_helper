<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>쿠팡 운송장 대량 등록</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; background: #f8f9fa; text-align: center; }
        .appbar {
            width: 100%; height: 60px; background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; position: fixed; top: 0; left: 0; z-index: 999;
            box-sizing: border-box;
        }
        .appbar-logo img { height: 35px; }
        .appbar-menu { display: flex; gap: 16px; align-items: center; }
        .appbar-menu a { font-size: 15px; text-decoration: none; color: #444; font-weight: 600; }
        .content-wrap { margin-top: 100px; padding-bottom: 40px; }
        h1 { font-size: 26px; font-weight: 700; color: #222; margin-bottom: 5px; }
        .upload-box {
            background: white; width: 420px; padding: 35px;
            margin: 20px auto; border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06); text-align: left;
        }
        select, input[type="file"] {
            width: 100%; padding: 10px; margin-top: 6px;
            border-radius: 10px; border: 1px solid #ccc;
            font-size: 14px; box-sizing: border-box;
        }
        .btn {
            width: 100%; padding: 12px; margin-top: 16px;
            background: #ffd84d; border: none; border-radius: 10px;
            font-size: 15px; font-weight: 600; cursor: pointer; display: block;
        }
        .btn:hover { background: #f0c240; }
        #status { margin-top: 15px; font-size: 14px; color: #444; text-align: center; }
        .onboarding {
            width: 420px; margin: 0 auto 16px;
            background: #fffbea; border: 1px solid #f6d860;
            border-radius: 16px; padding: 16px 20px; text-align: left;
        }
        .onboarding h3 { font-size: 14px; font-weight: 700; margin: 0 0 8px; color: #333; }
        .onboarding ol { margin: 0; padding-left: 18px; color: #555; font-size: 13px; line-height: 2; }
        label { font-size: 13px; color: #666; display: block; margin-top: 14px; }
        .custom-box {
            margin-top: 12px; background: #fefefe;
            padding: 14px; border-radius: 12px;
            border: 1px solid #ddd; display: none;
        }
        .custom-box p { font-size: 12px; color: #888; margin: 0 0 10px; }
        .custom-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .custom-row span { font-size: 13px; color: #444; width: 90px; flex-shrink: 0; }
        .custom-row input {
            flex: 1; padding: 7px 10px; border-radius: 8px;
            border: 1px solid #ccc; font-size: 13px;
            margin-top: 0; width: auto;
        }
        .divider { border: none; border-top: 1px solid #eee; margin: 16px 0; }
    </style>
</head>
<body>

<div class="appbar">
    <div class="appbar-logo"><img src="/images/logo.png" alt="logo"></div>
    <div class="appbar-menu" id="menu-area"></div>
</div>

<div class="content-wrap">
    <h1 style="margin-top:20px;">쿠팡 운송장 대량 등록</h1>
    <p style="color:#666; font-size:14px; margin:4px 0 16px;">
        정렬된 쿠팡 파일 + 택배사 출력파일을 올리면<br>
        운송장번호가 자동으로 입력된 파일을 받을 수 있어요
    </p>

    <div class="onboarding">
        <h3>📋 이렇게 사용하세요</h3>
        <ol>
            <li>메인페이지 변환 후 받은 <b>coupang_sorted.xlsx</b> 준비</li>
            <li>택배사 사이트에서 출력 후 받은 <b>출력파일 (운송장번호 포함)</b> 준비</li>
            <li>택배사 선택 후 두 파일 업로드</li>
            <li>다운로드된 파일을 쿠팡에 업로드하면 끝!</li>
        </ol>
    </div>

    <div class="upload-box">

        <!-- 택배사 선택 -->
        <label>택배사 선택</label>
        <select id="courier" onchange="onCourierChange()">
            <option value="hanjin">한진택배</option>
            <option value="custom">사용자 설정</option>
        </select>

        <!-- 사용자 설정: 운송장 열 지정 -->
        <div class="custom-box" id="custom-box">
            <p>택배사 출력파일에서 운송장번호가 있는 열을 입력해주세요 (예: D, E, AA)</p>
            <div class="custom-row">
                <span>운송장번호 열</span>
                <input id="invoiceCol" placeholder="예: D">
            </div>
        </div>

        <hr class="divider">

        <!-- 파일 업로드 -->
        <label>정렬된 쿠팡 파일 (coupang_sorted.xlsx)</label>
        <input type="file" id="coupangFile" accept=".xlsx,.xls">

        <label>택배사 출력파일 (운송장번호 포함)</label>
        <input type="file" id="hanjinFile" accept=".xlsx,.xls">

        <button class="btn" onclick="doMatch()">운송장 입력된 파일 다운로드</button>
        <div id="status">📂 두 파일을 업로드해주세요.</div>
    </div>
</div>

<script>
    // 한진 기본 운송장 열: D열
    const PRESETS = {
        hanjin: { invoiceCol: "D" }
    };

    function renderMenu() {
        const token = localStorage.getItem("token");
        const menu = document.getElementById("menu-area");
        if (token) {
            menu.innerHTML = `
                <a href="/index.html">홈</a>
                <span style="color:#444; font-weight:600;">로그인됨</span>
                <a href="#" onclick="logout()">로그아웃</a>
            `;
        } else {
            menu.innerHTML = `
                <a href="/signup.html">회원가입</a>
                <a href="/login.html">로그인</a>
            `;
        }
    }

    function logout() { localStorage.removeItem("token"); renderMenu(); }

    function onCourierChange() {
        const courier = document.getElementById("courier").value;
        const box = document.getElementById("custom-box");
        const invoiceInput = document.getElementById("invoiceCol");

        box.style.display = "block";

        if (courier === "custom") {
            invoiceInput.value = "";
            invoiceInput.readOnly = false;
            invoiceInput.style.background = "";
        } else if (PRESETS[courier]) {
            invoiceInput.value = PRESETS[courier].invoiceCol;
            invoiceInput.readOnly = true;
            invoiceInput.style.background = "#f5f5f5";
        }
    }

    window.onload = () => {
        renderMenu();
        onCourierChange();
    };

    async function doMatch() {
        const coupang = document.getElementById("coupangFile").files[0];
        const hanjin = document.getElementById("hanjinFile").files[0];
        const invoiceCol = document.getElementById("invoiceCol").value.trim();

        if (!coupang || !hanjin) {
            alert("두 파일을 모두 선택해주세요!");
            return;
        }

        if (!invoiceCol) {
            alert("운송장번호 열을 입력해주세요!");
            return;
        }

        const formData = new FormData();
        formData.append("coupang", coupang);
        formData.append("hanjin", hanjin);
        formData.append("invoiceCol", invoiceCol);

        document.getElementById("status").innerText = "⏳ 처리 중...";

        const res = await fetch("/match/hanjin", { method: "POST", body: formData });

        if (!res.ok) {
            document.getElementById("status").innerText = "❌ 실패! 파일을 확인해주세요.";
            return;
        }

        const blob = await res.blob();
        const a = document.createElement("a");
        a.href = window.URL.createObjectURL(blob);
        a.download = "matched_output.xlsx";
        a.click();

        document.getElementById("status").innerText = "✅ 완료! 다운로드됩니다.";
    }
</script>
</body>
</html>
